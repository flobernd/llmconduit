<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1800" height="1110" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>llmconduit architecture</title>
  <desc>Diagram of the llmconduit LLM gateway: clients, HTTP router, adapters, gateway engine, upstream client, config/profiles, server-side tools, and upstream backends, with their request and response flow.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.8"/>
      <feOffset dx="0" dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.14"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#64748b"/>
    </marker>
    <marker id="arrowm" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-size: 12.5px; fill: #64748b; }
      .boxtitle { font-size: 13px; font-weight: 600; }
      .boxsub { font-size: 10.5px; font-style: italic; }
      .body { font-size: 11px; fill: #334155; }
      .small { font-size: 9.5px; fill: #64748b; }
      .chip { font-size: 9px; fill: #334155; font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
      .arrowsmall { font-size: 9px; fill: #94a3b8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="740" fill="url(#bg)"/>

  <!-- Header -->
  <text x="600" y="40" text-anchor="middle" class="title">llmconduit architecture</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle">Normalize Anthropic Messages · OpenAI Responses · Chat Completions → upstream /v1/chat/completions</text>

  <!-- ============ llmconduit container ============ -->
  <rect x="235" y="92" width="730" height="560" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="112" class="small" fill="#64748b">llmconduit gateway</text>
  <text x="945" y="112" text-anchor="end" class="small" fill="#94a3b8" font-style="italic">gateway process · axum + tokio</text>

  <!-- ============ Config / Profiles ============ -->
  <g filter="url(#shadow)">
    <rect x="405" y="128" width="530" height="64" rx="10" fill="#fce7f3" stroke="#f472b6" stroke-width="1.5"/>
    <text x="420" y="148" class="boxtitle" fill="#831843">Config / Profiles · config.yaml</text>
    <!-- chips -->
    <g fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1">
      <rect x="445" y="156" width="88" height="16" rx="8"/>
      <rect x="539" y="156" width="61" height="16" rx="8"/>
      <rect x="606" y="156" width="18" height="16" rx="8"/>
      <rect x="630" y="156" width="77" height="16" rx="8"/>
      <rect x="713" y="156" width="61" height="16" rx="8"/>
      <rect x="780" y="156" width="55" height="16" rx="8"/>
      <rect x="841" y="156" width="55" height="16" rx="8"/>
    </g>
    <g class="chip" text-anchor="middle" fill="#831843">
      <text x="489" y="168">model_profiles</text>
      <text x="570" y="168">templates</text>
      <text x="615" y="168">*</text>
      <text x="669" y="168">capabilities</text>
      <text x="744" y="168">upstreams</text>
      <text x="808" y="168">fallback</text>
      <text x="869" y="168">cooldown</text>
    </g>
  </g>
  <!-- config feeds engine + upstream client -->
  <line x1="640" y1="192" x2="640" y2="288" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowm)"/>
  <text x="646" y="242" class="arrowsmall">profiles · caps</text>
  <line x1="820" y1="192" x2="820" y2="313" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowm)"/>
  <text x="826" y="242" class="arrowsmall">upstreams · fallback</text>

  <!-- ============ Clients (left) ============ -->
  <g filter="url(#shadow)">
    <rect x="30" y="250" width="180" height="66" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="30" y="330" width="180" height="66" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
    <rect x="30" y="410" width="180" height="66" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="120" y="274" class="boxtitle" fill="#0c4a6e">Claude Code</text>
    <text x="120" y="291" class="small" fill="#0369a1">Anthropic Messages</text>
    <text x="120" y="305" class="chip" fill="#0369a1">/v1/messages</text>
    <text x="120" y="354" class="boxtitle" fill="#0c4a6e">Codex / OpenAI</text>
    <text x="120" y="371" class="small" fill="#0369a1">Responses API</text>
    <text x="120" y="385" class="chip" fill="#0369a1">/v1/responses</text>
    <text x="120" y="434" class="boxtitle" fill="#0c4a6e">OpenAI clients</text>
    <text x="120" y="451" class="small" fill="#0369a1">Chat Completions</text>
    <text x="120" y="465" class="chip" fill="#0369a1">/v1/chat/completions</text>
  </g>
  <!-- clients -> router -->
  <text x="235" y="232" text-anchor="middle" class="arrowsmall">requests</text>
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="210" y1="283" x2="258" y2="338"/>
    <line x1="210" y1="363" x2="258" y2="385"/>
    <line x1="210" y1="443" x2="258" y2="432"/>
  </g>

  <!-- ============ HTTP Router ============ -->
  <g filter="url(#shadow)">
    <rect x="260" y="320" width="130" height="130" rx="10" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="325" y="342" class="boxtitle" fill="#4c1d95">HTTP Router</text>
    <text x="325" y="358" class="boxsub" fill="#6d28d9">axum</text>
  </g>
  <line x1="272" y1="366" x2="378" y2="366" stroke="#c4b5fd" stroke-width="1"/>
  <g class="chip" text-anchor="middle" fill="#5b21b6">
    <text x="325" y="382">/v1/messages</text>
    <text x="325" y="397">/v1/responses</text>
    <text x="325" y="412">/v1/chat/completions</text>
    <text x="325" y="427">/v1/models</text>
    <text x="325" y="442">/health</text>
  </g>

  <!-- ============ Adapters ============ -->
  <g filter="url(#shadow)">
    <rect x="405" y="310" width="165" height="150" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="487.5" y="332" class="boxtitle" fill="#78350f">Adapters</text>
    <text x="487.5" y="348" class="boxsub" fill="#b45309">wire ↔ Responses</text>
  </g>
  <line x1="417" y1="356" x2="558" y2="356" stroke="#fcd34d" stroke-width="1"/>
  <g fill="#fffbeb" stroke="#fcd34d" stroke-width="1">
    <rect x="415" y="364" width="145" height="18" rx="6"/>
    <rect x="415" y="386" width="145" height="18" rx="6"/>
    <rect x="415" y="408" width="145" height="18" rx="6"/>
    <rect x="415" y="430" width="145" height="18" rx="6"/>
  </g>
  <g class="chip" text-anchor="middle" fill="#78350f">
    <text x="487.5" y="377">anthropic_to_responses</text>
    <text x="487.5" y="399">chat_to_responses</text>
    <text x="487.5" y="421">responses_to_anthropic</text>
    <text x="487.5" y="443">responses_to_chat</text>
  </g>

  <!-- ============ Gateway Engine ============ -->
  <g filter="url(#shadow)">
    <rect x="585" y="290" width="185" height="190" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  </g>
  <g text-anchor="middle">
    <text x="677.5" y="314" class="boxtitle" fill="#1e3a8a">Gateway Engine</text>
    <text x="677.5" y="330" class="boxsub" fill="#1d4ed8">stream_responses( )</text>
  </g>
  <line x1="597" y1="338" x2="758" y2="338" stroke="#93c5fd" stroke-width="1"/>
  <g class="body">
    <text x="600" y="356" fill="#1e3a8a">• model resolution</text>
    <text x="600" y="374" fill="#1e3a8a">• per-profile shaping</text>
    <g class="small" fill="#475569">
      <text x="614" y="390">· roles</text>
      <text x="614" y="405">· reasoning_effort</text>
      <text x="614" y="420">· capabilities</text>
      <text x="614" y="435">· parallel_tool_calls</text>
    </g>
    <text x="600" y="454" fill="#1e3a8a">• system_prompt_prefix</text>
    <text x="600" y="470" fill="#1e3a8a">• server-side tool loop</text>
  </g>

  <!-- ============ Upstream Client ============ -->
  <g filter="url(#shadow)">
    <rect x="785" y="315" width="150" height="140" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="860" y="337" class="boxtitle" fill="#14532d">Upstream Client</text>
    <text x="860" y="353" class="boxsub" fill="#15803d">routing · failover</text>
  </g>
  <line x1="797" y1="361" x2="923" y2="361" stroke="#86efac" stroke-width="1"/>
  <g class="chip" text-anchor="middle" fill="#14532d">
    <text x="860" y="378">RoutingUpstreamClient</text>
    <text x="860" y="393">FailoverUpstreamClient</text>
    <text x="860" y="408">ReqwestUpstreamClient</text>
  </g>
  <g class="small" text-anchor="middle" fill="#15803d">
    <text x="860" y="425">prefetch · cooldown</text>
    <text x="860" y="440" class="chip">/v1/chat/completions</text>
  </g>

  <!-- ============ internal pipeline arrows ============ -->
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="390" y1="385" x2="403" y2="385"/>
    <line x1="570" y1="385" x2="583" y2="385"/>
    <line x1="770" y1="385" x2="783" y2="385"/>
  </g>

  <!-- ============ Server-side tools (Brave) ============ -->
  <g filter="url(#shadow)">
    <rect x="560" y="510" width="235" height="68" rx="10" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  </g>
  <text x="576" y="532" class="boxtitle" fill="#7c2d12">Server-side tools</text>
  <text x="576" y="550" class="body" fill="#7c2d12">Brave Search · web_search</text>
  <text x="576" y="566" class="small" fill="#9a3412">model calls tool → gateway runs it → feed back</text>
  <!-- engine <-> tools -->
  <line x1="677.5" y1="482" x2="677.5" y2="508" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#arrowm)" marker-end="url(#arrowm)"/>
  <text x="688" y="499" class="arrowsmall">tool round-trip</text>

  <!-- ============ Upstream backends (right) ============ -->
  <g filter="url(#shadow)">
    <rect x="985" y="250" width="170" height="66" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="985" y="330" width="170" height="66" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="985" y="410" width="170" height="66" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="1070" y="274" class="boxtitle" fill="#1e293b">vLLM (local)</text>
    <text x="1070" y="292" class="small" fill="#475569">/v1/chat/completions</text>
    <text x="1070" y="354" class="boxtitle" fill="#1e293b">OpenRouter</text>
    <text x="1070" y="372" class="small" fill="#475569">openrouter.ai/api/v1</text>
    <text x="1070" y="434" class="boxtitle" fill="#1e293b">OpenAI-compatible</text>
    <text x="1070" y="452" class="small" fill="#475569">local / remote</text>
  </g>
  <!-- upstream -> backends -->
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="935" y1="335" x2="983" y2="283"/>
    <line x1="935" y1="385" x2="983" y2="363"/>
    <line x1="935" y1="435" x2="983" y2="443"/>
  </g>
  <text x="960" y="492" text-anchor="middle" class="arrowsmall">routing · failover · cooldown</text>

  <!-- ============ Brave Search API ============ -->
  <g filter="url(#shadow)">
    <rect x="985" y="518" width="170" height="54" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  </g>
  <g text-anchor="middle">
    <text x="1070" y="540" class="boxtitle" fill="#7c2d12">Brave Search API</text>
    <text x="1070" y="558" class="small" fill="#9a3412">api.search.brave.com</text>
  </g>
  <!-- tools -> brave -->
  <line x1="795" y1="544" x2="983" y2="545" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowm)"/>
  <text x="889" y="537" text-anchor="middle" class="arrowsmall">web_search</text>

  <!-- ============ response return path ============ -->
  <path d="M860,455 L860,615 L335,615 L335,452" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowm)"/>
  <text x="597.5" y="634" text-anchor="middle" class="small" font-style="italic" fill="#64748b">response stream (SSE) → adapters convert to client wire format → client</text>

  <!-- ============ observability & tooling ============ -->
  <rect x="260" y="660" width="675" height="44" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="270" y="676" class="small" font-style="italic" fill="#94a3b8">observability &amp; tooling</text>
  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="1">
    <rect x="300" y="682" width="112" height="16" rx="8"/>
    <rect x="418" y="682" width="72" height="16" rx="8"/>
    <rect x="496" y="682" width="118" height="16" rx="8"/>
    <rect x="620" y="682" width="58" height="16" rx="8"/>
    <rect x="684" y="682" width="212" height="16" rx="8"/>
  </g>
  <g class="small" text-anchor="middle" fill="#475569">
    <text x="356" y="693">monitor / debug UI</text>
    <text x="454" y="693">replay store</text>
    <text x="555" y="693">request log · JSONL</text>
    <text x="649" y="693">raw mode</text>
    <text x="790" y="693">CLI: configure · start · analyze-log</text>
  </g>
</svg>
